# Netlify deployment for the Dataset Matcher webapp (webapp/).
# The build runs sync-assets (prebuild), which copies the Python matcher
# sources and explanatory PDFs from matcher/ into webapp/public/, so the
# deploy always ships the same matcher code the tests cover.

[build]
  base = "webapp"
  command = "pnpm build"
  publish = "dist"

[build.environment]
  # package.json pins the pnpm version via packageManager; corepack must not
  # phone home for "latest" (stale signing keys break the build).
  COREPACK_DEFAULT_TO_LATEST = "0"

# React Router SPA: serve index.html for every route (/match, /about).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Pyodide runs in a Web Worker and fetches the matcher .py files; long-cache
# the immutable build assets, never cache the HTML shell.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
