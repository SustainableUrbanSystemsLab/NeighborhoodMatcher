<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="NeighborhoodMatcher logo">
  <!-- Two datasets as rounded tiles; the bold connector is the match. -->
  <defs>
    <linearGradient id="nm-link" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
  </defs>

  <!-- supplemental tile (back, slate) -->
  <rect x="30" y="24" width="28" height="28" rx="8" fill="#475569"/>
  <!-- its rows: three data dots -->
  <circle cx="38" cy="33" r="2.6" fill="#cbd5e1"/>
  <circle cx="46" cy="38" r="2.6" fill="#cbd5e1"/>
  <circle cx="50" cy="44" r="2.6" fill="#94a3b8"/>

  <!-- target tile (front, blue) -->
  <rect x="6" y="12" width="28" height="28" rx="8" fill="#2563eb"/>
  <!-- its rows -->
  <circle cx="14" cy="20" r="2.6" fill="#bfdbfe"/>
  <circle cx="22" cy="25" r="2.6" fill="#bfdbfe"/>
  <circle cx="26" cy="32" r="2.6" fill="#ffffff"/>

  <!-- the match: best pair connected -->
  <path d="M26 32 C 32 36, 34 30, 38 33" fill="none" stroke="url(#nm-link)" stroke-width="3.4" stroke-linecap="round"/>
  <circle cx="26" cy="32" r="4.6" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="38" cy="33" r="4.6" fill="none" stroke="#cbd5e1" stroke-width="2"/>
</svg>
