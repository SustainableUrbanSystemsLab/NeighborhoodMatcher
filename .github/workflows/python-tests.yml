name: Python tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  matcher:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # setup-uv@v3 has no python-version input; pin the interpreter via uv.
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
      - name: Run pytest
        working-directory: matcher
        run: uv run --project . --python 3.10 pytest
      - name: Webapp matcher copy is in sync
        run: |
          node webapp/scripts/sync-assets.mjs
          # -N registers new files so untracked drift also fails the diff
          git add -N webapp/public/matcher
          git diff --exit-code webapp/public/matcher
