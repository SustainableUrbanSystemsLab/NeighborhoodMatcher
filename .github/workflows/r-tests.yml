name: R tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  r-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r
          extra-packages: |
            any::testthat
            any::digest
      - name: Install package
        working-directory: r
        run: R CMD INSTALL .
      - name: Run tests
        working-directory: r
        run: Rscript -e "testthat::test_dir('tests/testthat')"
